version: '3.9'

services:
 api:
   build: .
   ports:
     - "5000:8080"
   depends_on:
     - db
   environment:
     - ConnectionStrings__DefaultConnection=Server=db;Database=OrderSystemDb;User=sa;Password=Your_password123;TrustServerCertificate=True;
     - ASPNETCORE_ENVIRONMENT=Development
  
 db:
   image: mcr.microsoft.com/mssql/server:2022-latest
   environment:
     - ACCEPT_EULA=Y
     - SA_PASSWORD=Your_password123
   ports:
     - "1433:1433"
